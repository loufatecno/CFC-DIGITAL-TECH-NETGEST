<style>

.tab{display:flex;flex-direction:column;align-items:center;gap:1px;padding:6px 4px;border:none;background:0;color:var(--dm);font-size:8px;font-weight:500;cursor:pointer;position:relative;min-width:44px;transition:.12s}

.tab .dot{position:absolute;top:1px;right:4px;width:7px;height:7px;border-radius:50%;background:var(--rd2)}

.login-screen{display:flex;align-items:center;justify-content:center;height:100vh;padding:20px;background:radial-gradient(ellipse at 50% 30%,rgba(0,172,193,.05),transparent 70%),var(--bg)}
.login-box{width:300px;max-width:100%;text-align:center}
.login-box .logo-big{width:64px;height:64px;background:linear-gradient(135deg,var(--cy),var(--bl2));border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:12px}

/* ── TICKET ── */

.ticket .t-head{text-align:center;border-bottom:2px dashed #ddd;padding-bottom:12px;margin-bottom:12px}

/* ── ALERT CARD ── */
.alert-card{background:var(--rdd);border:1px solid rgba(239,83,80,.2);border-radius:10px;padding:10px 12px;display:flex;align-items:center;justify-content:space-between;margin-bottom:5px;cursor:pointer}
.alert-card.warn{background:var(--amd);border-color:rgba(255,167,38,.2)}
.alert-card .ac-left{display:flex;align-items:center;gap:8px}
.alert-card .ac-name{font-size:12px;font-weight:600;color:var(--wh)}

.alert-card .ac-amount{font-size:9px;color:var(--dm)}
.install-banner{background:linear-gradient(135deg,var(--cy),var(--bl2));padding:10px 14px;border-radius:10px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;color:#fff}
.install-banner .ib-text{font-size:11px;font-weight:600}
.install-banner .ib-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:5px 12px;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer}
.toast{position:fixed;top:56px;left:50%;transform:translateX(-50%);padding:9px 18px;border-radius:10px;font-size:12px;font-weight:600;color:#fff;z-index:9999;animation:ti .2s;box-shadow:0 4px 20px rgba(0,0,0,.4)}
@keyframes ti{from{transform:translateX(-50%) translateY(-16px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px}

<script>
// ══════════════════════════════════════════════════════════════
// CONFIG — Plans modifiables par l'utilisateur
// ══════════════════════════════════════════════════════════════
const DEFAULT_PLANS=[{id:"basic",name:"Basic",speed:"5 Mbps",price:10000},{id:"standard",name:"Standard",speed:"10 Mbps",price:15000},{id:"premium",name:"Premium",speed:"20 Mbps",price:25000},{id:"entreprise",name:"Entreprise",speed:"50 Mbps",price:50000}];
const STATUTS=["Actif","Suspendu","Expiré","En attente","Résilié"];
const MODES=["Espèces","Wave","Orange Money","Free Money","Virement"];
const EQUIPS=["Tenda F3","TP-Link WR840N","MikroTik hAP lite","LiteBeam + Tenda","LiteBeam 5AC","Autre"];

const $F=n=>(n||0).toLocaleString("fr-FR")+" FCFA";
const $D=d=>d?new Date(d).toLocaleDateString("fr-FR"):"—";
const $T=()=>new Date().toISOString().split("T")[0];
const $ID=()=>"CLI-"+String(Math.floor(Math.random()*9000)+1000);
const $MAC=()=>Array.from({length:6},()=>Math.floor(Math.random()*256).toString(16).padStart(2,"0").toUpperCase()).join(":");
const $CM=()=>{const n=new Date();return n.getFullYear()+"-"+String(n.getMonth()+1).padStart(2,"0")};
const $REC=()=>"TK-"+Date.now().toString().slice(-8);
const avatarColors=["#00ACC1","#2E7D32","#EF6C00","#C62828","#7C3AED","#1565C0","#00897B","#D81B60"];
const getAC=name=>avatarColors[Math.abs([...(name||"?")].reduce((a,c)=>a+c.charCodeAt(0),0))%avatarColors.length];
const getIn=name=>(name||"?").split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase();

// ══════════════════════════════════════════════════════════════
// DATABASE
// ══════════════════════════════════════════════════════════════
const DB={g(k,d){try{return JSON.parse(localStorage.getItem("nm5_"+k))||d}catch{return d}},s(k,v){localStorage.setItem("nm5_"+k,JSON.stringify(v))}};

let clients=DB.g("cl",[]);
let payments=DB.g("pa",[]);
let plans=DB.g("plans",DEFAULT_PLANS);
let config=DB.g("cfg",{nom:"Réseau Communautaire",localite:"",responsable:"",tel:"",pin:"",routeur:"MikroTik L009"});
let page="dashboard",subPage=null,selectedId=null;
let authenticated=!config.pin;

function save(){DB.s("cl",clients);DB.s("pa",payments);DB.s("plans",plans);DB.s("cfg",config)}
function getPlan(id){return plans.find(p=>p.id===id)||plans[0]}

// Payment logic
function gJ(c){return c.jourPaiement||(c.dateInscription?new Date(c.dateInscription).getDate():1)}
function gDaysLeft(c){
  const n=new Date(),d=gJ(c);
  const thisM=new Date(n.getFullYear(),n.getMonth(),d);
  if(thisM>n)return Math.ceil((thisM-n)/864e5);
  const nextM=new Date(n.getFullYear(),n.getMonth()+1,d);
  return Math.ceil((nextM-n)/864e5);
}
function gDaysLate(c){
  const n=new Date(),d=gJ(c);
  const due=new Date(n.getFullYear(),n.getMonth(),d);
  if(n>due)return Math.ceil((n-due)/864e5);
  return 0;
}
function gPS(c){
  if(c.statut!=="Actif")return"na";const n=new Date(),cm=$CM();
  if(payments.some(p=>p.clientId===c.id&&p.moisCouvert===cm&&p.statut==="Payé"))return"paye";
  const d=gJ(c),due=new Date(n.getFullYear(),n.getMonth(),d);
  if(n>due)return"impaye";if(Math.ceil((due-n)/864e5)<=3)return"bientot";return"ok";
}

// Toast
let tT;function toast(m,t="success"){clearTimeout(tT);let e=document.getElementById("toast");if(!e){e=document.createElement("div");e.id="toast";e.className="toast";document.body.appendChild(e)}e.textContent=m;e.style.background=t==="success"?"var(--gn2)":t==="info"?"var(--bl2)":"var(--rd2)";e.style.display="block";tT=setTimeout(()=>e.style.display="none",2500)}

// ══════════════════════════════════════════════════════════════
// TICKET GENERATION & WHATSAPP
// ══════════════════════════════════════════════════════════════
function generateTicketHTML(payId){
  const p=payments.find(x=>x.id===payId);if(!p)return"";
  const c=clients.find(x=>x.id===p.clientId);const pl=c?getPlan(c.plan):null;
  const moisLabel=p.moisCouvert?new Date(p.moisCouvert+"-01").toLocaleDateString("fr-FR",{month:"long",year:"numeric"}):"—";
  return`<div class="ticket">
    <div class="t-head"><h2>📡 ${config.nom||"Réseau Communautaire"}</h2><div class="t-sub">${config.localite||""} ${config.tel?"• Tél: "+config.tel:""}</div>
    <div class="t-num">TICKET N° ${p.recu||$REC()}</div></div>
    <div class="t-row"><span class="t-label">Date :</span><span class="t-val">${$D(p.datePaiement)}</span></div>
    <div class="t-row"><span class="t-label">Client :</span><span class="t-val">${c?.nom||"—"}</span></div>
    <div class="t-row"><span class="t-label">ID :</span><span class="t-val">${p.clientId}</span></div>
    <div class="t-row"><span class="t-label">Téléphone :</span><span class="t-val">${c?.telephone||"—"}</span></div>

function showTicket(payId){

function shareWhatsApp(payId){
  const p=payments.find(x=>x.id===payId);if(!p)return;
  const c=clients.find(x=>x.id===p.clientId);const pl=c?getPlan(c.plan):null;
  const mois=p.moisCouvert?new Date(p.moisCouvert+"-01").toLocaleDateString("fr-FR",{month:"long",year:"numeric"}):"";
  const phone=c?.telephone?.replace(/\s/g,"")||"";
  const fullPhone=phone.startsWith("+")? phone : phone.startsWith("00")? "+"+phone.slice(2) : "+221"+phone;
  
  const text=`📡 *${config.nom||"Réseau Communautaire"}*\n━━━━━━━━━━━━━━━━\n🎫 *TICKET DE PAIEMENT*\n━━━━━━━━━━━━━━━━\nN° : ${p.recu||""}\nDate : ${$D(p.datePaiement)}\n\n👤 Client : *${c?.nom||""}*\nID : ${p.clientId}\n📋 Plan : ${pl?.name||""} (${pl?.speed||""})\n📅 Mois : ${mois}\n💳 Mode : ${p.mode||""}\n\n💰 *Montant : ${$F(p.montant)}*\n\n✅ *PAYÉ*\n━━━━━━━━━━━━━━━━\nMerci pour votre confiance !`;
  
  const encoded=encodeURIComponent(text);
  window.open(`https://wa.me/${fullPhone}?text=${encoded}`,"_blank");
}

function printTicket(payId){
  document.getElementById("print-area").innerHTML=generateTicketHTML(payId);
  window.print();
}

    <div class="card-list">
      ${f.length===0?'<div style="text-align:center;padding:24px;color:var(--dm)"><div style="font-size:32px;margin-bottom:6px">💳</div><p style="font-size:11px">Aucun paiement</p></div>':
        f.slice(0,50).map(p=>{const c=clients.find(x=>x.id===p.clientId);
          return`<div class="pay-item"><div class="pi-left"><div class="pi-icon" style="background:var(--gnd)">${mi[p.mode]||"💰"}</div><div><div class="pi-name">${c?.nom||"—"}</div><div class="pi-meta">${p.mode} • ${p.recu||""}</div></div></div>
          <div style="text-align:right"><div class="pi-amount">${$F(p.montant)}</div><div class="pi-date">${$D(p.datePaiement)}</div>
          <div class="pi-actions"><button class="btn btn-sm btn-gh" onclick="showTicket('${p.id}')" style="font-size:9px;padding:2px 6px">🎫</button><button class="btn btn-sm btn-wa" onclick="shareWhatsApp('${p.id}')" style="font-size:9px;padding:2px 6px">📱</button></div></div></div>`;
        }).join("")}
    </div>`;
}

// ══════════════════════════════════════════════════════════════
// TICKETS PAGE — Vue de tous les tickets
// ══════════════════════════════════════════════════════════════
function rTickets(el){
  const sorted=payments.filter(p=>p.statut==="Payé").sort((a,b)=>new Date(b.datePaiement)-new Date(a.datePaiement));
  el.innerHTML=`
    <div class="ph"><div><h2>🎫 Tickets</h2><div class="sub">${sorted.length} tickets générés</div></div></div>
    <div class="card-list">
      ${sorted.length===0?'<div style="text-align:center;padding:24px;color:var(--dm)"><div style="font-size:32px;margin-bottom:6px">🎫</div><p style="font-size:11px">Enregistrez un paiement pour générer un ticket</p></div>':
        sorted.slice(0,50).map(p=>{const c=clients.find(x=>x.id===p.clientId);const pl=c?getPlan(c.plan):null;
          return`<div style="background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">
            <div><div style="font-size:13px;font-weight:700;color:var(--wh)">${c?.nom||"—"}</div><div style="font-size:10px;color:var(--dm)">${p.recu} • ${$D(p.datePaiement)} • ${p.mode}</div></div>
            <div style="display:flex;align-items:center;gap:6px">
              <span style="font-size:13px;font-weight:700;color:var(--gn2);font-family:'JetBrains Mono',monospace">${$F(p.montant)}</span>
              <button class="btn btn-sm btn-cy" onclick="showTicket('${p.id}')" style="padding:4px 8px;font-size:10px">🎫 Voir</button>
              <button class="btn btn-sm btn-wa" onclick="shareWhatsApp('${p.id}')" style="padding:4px 8px;font-size:10px">📱</button>
            </div>
          </div>`;
        }).join("")}
    </div>`;
}

// ══════════════════════════════════════════════════════════════
// SETTINGS — with editable plans
// ══════════════════════════════════════════════════════════════
function rSettings(el){
  el.innerHTML=`
    <div class="ph"><h2>Paramètres</h2></div>
    <div class="setting-item" onclick="openCfgModal()"><div class="si-left"><div class="si-icon" style="background:var(--cyd)">📡</div><div><div class="si-title">Réseau</div><div class="si-desc">${config.nom||"Configurer"}</div></div></div><span style="color:var(--dm)">›</span></div>
    <div class="setting-item" onclick="openPlansModal()"><div class="si-left"><div class="si-icon" style="background:var(--amd)">💰</div><div><div class="si-title">Plans & Tarifs</div><div class="si-desc">Modifier les prix, noms, vitesses</div></div></div><span style="color:var(--dm)">›</span></div>
    <div class="setting-item" onclick="openPinModal()"><div class="si-left"><div class="si-icon" style="background:var(--rdd)">🔒</div><div><div class="si-title">Code PIN</div><div class="si-desc">${config.pin?"Activé":"Désactivé"}</div></div></div><span style="color:var(--dm)">›</span></div>
    <div class="setting-item" onclick="backupAll()"><div class="si-left"><div class="si-icon" style="background:var(--gnd)">💾</div><div><div class="si-title">Sauvegarder</div><div class="si-desc">Exporter JSON</div></div></div><span style="color:var(--dm)">›</span></div>
    <div class="setting-item" onclick="document.getElementById('rf').click()"><div class="si-left"><div class="si-icon" style="background:var(--bld)">📤</div><div><div class="si-title">Restaurer</div><div class="si-desc">Importer depuis fichier</div></div></div><span style="color:var(--dm)">›</span></div>
    <input type="file" id="rf" accept=".json" style="display:none" onchange="restoreFile(this)">
    <div class="setting-item" onclick="expCSV('cl')"><div class="si-left"><div class="si-icon" style="background:var(--amd)">📋</div><div><div class="si-title">Export clients CSV</div><div class="si-desc">${clients.length} clients</div></div></div><span style="color:var(--dm)">›</span></div>
    <div class="setting-item" onclick="expCSV('pa')"><div class="si-left"><div class="si-icon" style="background:var(--amd)">💳</div><div><div class="si-title">Export paiements CSV</div><div class="si-desc">${payments.length} paiements</div></div></div><span style="color:var(--dm)">›</span></div>
    <div style="margin-top:16px;padding:12px;background:var(--s1);border:1px solid var(--bd);border-radius:10px;text-align:center">
      <div style="display:flex;justify-content:space-around;font-size:11px;color:var(--mu)"><div><strong style="color:var(--wh)">${clients.length}</strong> clients</div><div><strong style="color:var(--wh)">${payments.length}</strong> paiements</div></div>
      <div style="margin-top:8px;font-size:9px;color:var(--cy);font-weight:700">NET MANAGER v5.0 — GIE RICS</div>
    </div>
    <button class="btn btn-rd btn-full" style="margin-top:10px" onclick="if(confirm('Supprimer TOUTES les données ?')){localStorage.clear();location.reload()}">🗑️ Réinitialiser</button>
  `;
}

// ══════════════════════════════════════════════════════════════
// MODALS
// ══════════════════════════════════════════════════════════════
function showModal(html){const d=document.createElement("div");d.className="modal-overlay";d.onclick=e=>{if(e.target===d)d.remove()};d.innerHTML=`<div class="modal-sheet"><div class="handle"></div>${html}</div>`;document.getElementById("root").appendChild(d)}
function closeM(){document.querySelector(".modal-overlay")?.remove()}

// Client add/edit
function openCM(id){
  const c=id?clients.find(x=>x.id===id):null;
  showModal(`<h3>${c?"Modifier":"Nouveau client"}</h3><div class="fg">
    <div class="fd full"><label>Nom complet *</label><input id="f-n" value="${c?.nom||""}"></div>
    <div class="fd"><label>Téléphone *</label><input id="f-t" value="${c?.telephone||""}" inputmode="tel"></div>
    <div class="fd"><label>N° Maison</label><input id="f-ma" value="${c?.maison||""}"></div>
    <div class="fd full"><label>Adresse</label><input id="f-a" value="${c?.adresse||""}"></div>
    <div class="fd"><label>Plan</label><select id="f-p">${plans.map(p=>`<option value="${p.id}" ${c?.plan===p.id?'selected':''}>${p.name} — ${$F(p.price)}</option>`).join("")}</select></div>
    <div class="fd"><label>Statut</label><select id="f-s">${STATUTS.map(s=>`<option ${c?.statut===s?'selected':''}>${s}</option>`).join("")}</select></div>
    <div class="fd"><label>Date inscription</label><input type="date" id="f-d" value="${c?.dateInscription||$T()}" onchange="document.getElementById('f-j').value=new Date(this.value).getDate()"></div>
    <div class="fd"><label>Jour paiement</label><input type="number" id="f-j" min="1" max="31" value="${c?gJ(c):new Date().getDate()}" inputmode="numeric"></div>
    <div class="sep"><span>Technique</span></div>
    <div class="fd"><label>Équipement</label><select id="f-eq">${EQUIPS.map(e=>`<option ${c?.equipement===e?'selected':''}>${e}</option>`).join("")}</select></div>
    <div class="fd"><label>IP</label><input id="f-ip" value="${c?.ip||""}" placeholder="192.168.88.xx"></div>
    <div class="fd"><label>Login PPPoE</label><input id="f-l" value="${c?.loginPPPoE||""}"></div>
    <div class="fd"><label>Mot de passe</label><input id="f-mp" value="${c?.mdpPPPoE||""}"></div>
  </div><button class="btn btn-cy btn-full" style="margin-top:14px" onclick="saveCF('${id||''}')">${c?"Enregistrer":"Ajouter"}</button>`);
}

function saveCF(id){const n=document.getElementById("f-n").value.trim(),t=document.getElementById("f-t").value.trim();if(!n||!t)return alert("Nom et téléphone requis");const d={nom:n,telephone:t,maison:document.getElementById("f-ma").value,adresse:document.getElementById("f-a").value,plan:document.getElementById("f-p").value,statut:document.getElementById("f-s").value,dateInscription:document.getElementById("f-d").value,jourPaiement:+document.getElementById("f-j").value||1,equipement:document.getElementById("f-eq").value,ip:document.getElementById("f-ip").value,loginPPPoE:document.getElementById("f-l").value,mdpPPPoE:document.getElementById("f-mp").value};if(id){const i=clients.findIndex(c=>c.id===id);if(i>=0)clients[i]={...clients[i],...d};toast("Mis à jour")}else{clients.push({...d,id:$ID(),dateCreation:$T(),mac:$MAC()});toast(n+" ajouté")}save();closeM();render()}
function delC(id){if(!confirm("Supprimer ce client et ses paiements ?"))return;clients=clients.filter(c=>c.id!==id);payments=payments.filter(p=>p.clientId!==id);save();toast("Supprimé","info");nav("clients")}

// Payment modal
function openPM(){const act=clients.filter(c=>c.statut==="Actif");const cm=$CM();showModal(`<h3>Nouveau paiement</h3><div class="fg"><div class="fd full"><label>Client</label><select id="pm-c" onchange="upPMA()">${act.map(c=>`<option value="${c.id}">${c.nom}</option>`).join("")}</select></div><div id="pm-info" class="full"></div><div class="fd"><label>Date</label><input type="date" id="pm-d" value="${$T()}"></div><div class="fd"><label>Montant</label><input type="number" id="pm-m" value="0" inputmode="numeric"></div><div class="fd"><label>Mode</label><select id="pm-mo">${MODES.map(m=>`<option>${m}</option>`).join("")}</select></div><div class="fd"><label>Mois</label><input type="month" id="pm-mc" value="${cm}"></div></div><button class="btn btn-gn btn-full" style="margin-top:14px" onclick="savePF()">✓ Enregistrer + Générer ticket</button>`);setTimeout(upPMA,50)}
function upPMA(){const cid=document.getElementById("pm-c")?.value;const c=clients.find(x=>x.id===cid);const pl=c?getPlan(c.plan):null;const info=document.getElementById("pm-info");if(c&&pl){info.innerHTML=`<div style="background:var(--cyd);border-radius:8px;padding:8px 10px;font-size:10px;color:var(--cy)">${pl.name} — ${$F(pl.price)} — Jour ${gJ(c)}</div>`;document.getElementById("pm-m").value=pl.price}else if(info)info.innerHTML=""}
function savePF(){const cid=document.getElementById("pm-c")?.value;if(!cid)return;const recu=$REC();const payId="PAY-"+Date.now();payments.push({id:payId,clientId:cid,datePaiement:document.getElementById("pm-d").value,montant:+document.getElementById("pm-m").value||0,mode:document.getElementById("pm-mo").value,moisCouvert:document.getElementById("pm-mc").value,statut:"Payé",recu});save();toast("Paiement enregistré");closeM();setTimeout(()=>showTicket(payId),200);render()}

// Config modal
function openCfgModal(){showModal(`<h3>Configuration</h3><div class="fg"><div class="fd full"><label>Nom du réseau</label><input id="c-n" value="${config.nom||""}"></div><div class="fd"><label>Localité</label><input id="c-l" value="${config.localite||""}"></div><div class="fd"><label>Responsable</label><input id="c-r" value="${config.responsable||""}"></div><div class="fd full"><label>Téléphone réseau</label><input id="c-t" value="${config.tel||""}"></div></div><button class="btn btn-cy btn-full" style="margin-top:14px" onclick="config.nom=document.getElementById('c-n').value;config.localite=document.getElementById('c-l').value;config.responsable=document.getElementById('c-r').value;config.tel=document.getElementById('c-t').value;save();toast('Sauvé');closeM();render()">✓ Enregistrer</button>`)}

// ── PLANS MODAL — Modifier les prix ──
function openPlansModal(){
  showModal(`<h3>💰 Plans & Tarifs</h3>
    <p style="font-size:10px;color:var(--dm);margin-bottom:12px">Modifiez les noms, vitesses et prix de chaque forfait</p>
    ${plans.map((p,i)=>`
      <div style="background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:12px;margin-bottom:8px">
        <div style="font-size:10px;color:var(--cy);font-weight:700;margin-bottom:6px;text-transform:uppercase">Plan ${i+1}</div>
        <div class="fg">
          <div class="fd"><label>Nom</label><input id="pl-n-${i}" value="${p.name}"></div>
          <div class="fd"><label>Vitesse</label><input id="pl-s-${i}" value="${p.speed}"></div>
          <div class="fd full"><label>Prix mensuel (FCFA)</label><input type="number" id="pl-p-${i}" value="${p.price}" inputmode="numeric"></div>
        </div>
      </div>
    `).join("")}
    <button class="btn btn-am btn-full" style="margin-top:8px" onclick="addPlan()">＋ Ajouter un plan</button>
    <button class="btn btn-cy btn-full" style="margin-top:8px" onclick="savePlans()">✓ Enregistrer les tarifs</button>
  `);
}

function savePlans(){
  plans.forEach((p,i)=>{
    const n=document.getElementById("pl-n-"+i);const s=document.getElementById("pl-s-"+i);const pr=document.getElementById("pl-p-"+i);
    if(n)p.name=n.value;if(s)p.speed=s.value;if(pr)p.price=+pr.value||0;
  });
  save();toast("Tarifs mis à jour");closeM();render();
}

function addPlan(){
  const id="plan_"+Date.now();
  plans.push({id,name:"Nouveau plan",speed:"0 Mbps",price:0});
  save();closeM();openPlansModal();
}

// PIN modal
function openPinModal(){showModal(`<h3>Code PIN</h3><div class="fd"><label>Nouveau PIN (vide = désactivé)</label><input type="password" id="pin-new" maxlength="6" placeholder="••••" inputmode="numeric" value="${config.pin||""}"></div><button class="btn btn-cy btn-full" style="margin-top:12px" onclick="config.pin=document.getElementById('pin-new').value;save();toast(config.pin?'PIN activé':'PIN désactivé');closeM()">✓ Enregistrer</button>`)}

// Export / Backup / Restore
function expCSV(type){let h,r;if(type==="cl"){h=["ID","Nom","Téléphone","Maison","Adresse","Plan","Tarif","Statut","Date inscription","Jour paiement"];r=clients.map(c=>{const pl=getPlan(c.plan);return[c.id,c.nom,c.telephone,c.maison,c.adresse,pl.name,pl.price,c.statut,c.dateInscription,gJ(c)]})}else{h=["Date","Client","Montant","Mode","Mois","Statut","Reçu"];r=payments.map(p=>{const c=clients.find(x=>x.id===p.clientId);return[p.datePaiement,c?.nom,p.montant,p.mode,p.moisCouvert,p.statut,p.recu]})}dlF(type+"_export.csv","\uFEFF"+[h.join(";"),...r.map(x=>x.map(v=>'"'+(v||"")+'"').join(";"))].join("\n"),"text/csv");toast("CSV exporté","info")}
function backupAll(){dlF("net-manager-backup-"+$T()+".json",JSON.stringify({version:"5.0",date:$T(),config,clients,payments,plans},null,2),"application/json");toast("Sauvegarde téléchargée","info")}
function restoreFile(input){const f=input.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(!confirm(`Restaurer ${d.clients?.length||0} clients ?`))return;if(d.config)config=d.config;if(d.clients)clients=d.clients;if(d.payments)payments=d.payments;if(d.plans)plans=d.plans;save();toast("Restauré !");render()}catch{alert("Fichier invalide")}};r.readAsText(f);input.value=""}
function dlF(name,content,type){const b=new Blob([content],{type});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download=name;a.click()}

render();
</script>
</body>
</html>
